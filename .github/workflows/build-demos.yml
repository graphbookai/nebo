name: Build demo runs for docs Space

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Redeploy demos Space (factory reset)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          NEBO_DEMOS_TOKEN: ${{ secrets.NEBO_DEMOS_TOKEN }}
        run: |
          uv run nebo deploy \
            --space-id graphbookai/nebo-demos \
            --api-token "$NEBO_DEMOS_TOKEN" \
            --read public --write private \
            --from-source

      - name: Build and upload demo runs
        env:
          NEBO_DEMOS_URL: https://graphbookai-nebo-demos.hf.space
          NEBO_DEMOS_TOKEN: ${{ secrets.NEBO_DEMOS_TOKEN }}
        run: uv run python docs/scripts/build_docs_demos.py
