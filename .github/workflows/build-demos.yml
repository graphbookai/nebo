name: Build demo runs for docs Space

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-groups

      # `nebo deploy --from-source` builds a wheel from the current
      # checkout via `uv build`. Hatch's `artifacts = ["nebo/server/static/**"]`
      # only ships files that exist on disk at build time, and the static
      # bundle is gitignored (it's a generated artifact). Without these
      # two steps the wheel ships an empty `nebo/server/static/`, the
      # daemon's `app.mount("/", StaticFiles(...))` is skipped, and the
      # Space serves `{"detail":"Not Found"}` for every UI route.
      - name: Build UI
        run: |
          cd ui
          npm ci
          npm run build

      - name: Copy UI assets to static directory
        run: |
          rm -rf nebo/server/static/*
          cp -r ui/dist/* nebo/server/static/

      - name: Redeploy demos Space (factory reset)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          NEBO_DEMOS_TOKEN: ${{ secrets.NEBO_DEMOS_TOKEN }}
        run: |
          uv run nebo deploy \
            --space-id graphbookai/nebo-demos \
            --api-token "$NEBO_DEMOS_TOKEN" \
            --read public --write private \
            --from-source

      - name: Build and upload demo runs
        env:
          NEBO_DEMOS_URL: https://graphbookai-nebo-demos.hf.space
          NEBO_DEMOS_TOKEN: ${{ secrets.NEBO_DEMOS_TOKEN }}
        run: uv run python docs/scripts/build_docs_demos.py
