name: Deploy docs to graphbook

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout nebo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build docs
        run: uv run sphinx-build -b html docs _site

      - name: Checkout graphbook
        uses: actions/checkout@v4
        with:
          repository: graphbookai/graphbook
          token: ${{ secrets.GRAPHBOOK_DOCS_TOKEN }}
          path: graphbook
          ref: main

      - name: Sync built docs into graphbook/docs/nebo
        run: |
          rm -rf graphbook/docs/nebo
          mkdir -p graphbook/docs/nebo
          cp -r _site/. graphbook/docs/nebo/

      - name: Commit and push
        working-directory: graphbook
        run: |
          git config user.name "nebo-docs-bot"
          git config user.email "nebo-docs-bot@users.noreply.github.com"
          git add docs/nebo
          if git diff --cached --quiet; then
            echo "No doc changes to commit."
            exit 0
          fi
          git commit -m "docs(nebo): sync from nebo@${{ github.sha }}"
          git push origin main
